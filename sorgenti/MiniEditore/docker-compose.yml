services:
  api:
    build:
      context: .
      dockerfile: src/App.Api/Dockerfile
    image: minieditore-api:local
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/app/data/minieditore.db
    ports:
      - "8080:8080"
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: src/App.Web/Dockerfile
    image: minieditore-web:local
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiBaseAddress: http://api:8080
    ports:
      - "8081:8080"
    depends_on:
      - api

volumes:
  api-data: